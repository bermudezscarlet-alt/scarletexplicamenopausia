<style>
/* Estilos para nuevas funcionalidades */
.dynamic-summary {
  background: linear-gradient(135deg, #F5F0FF 0%, #EDE9FE 100%);
  border-radius: 20px;
  padding: 18px;
  margin: 20px 0;
  border-left: 4px solid #8B5CF6;
}
.dynamic-summary h4 {
  font-family: 'DM Serif Display', serif;
  font-size: 18px;
  color: #4A1F8C;
  margin-bottom: 8px;
}
.dynamic-summary p {
  font-size: 13px;
  color: #5A3D7A;
  line-height: 1.6;
  margin-bottom: 12px;
}
.dynamic-stage-tag {
  display: inline-block;
  background: #8B5CF6;
  color: white;
  padding: 4px 12px;
  border-radius: 30px;
  font-size: 11px;
  font-weight: 500;
  margin-top: 8px;
}

.pdf-btn {
  background: linear-gradient(135deg, #4A1F8C 0%, #8B5CF6 100%);
  color: white;
  border: none;
  border-radius: 40px;
  padding: 14px 24px;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  width: 100%;
  margin: 16px 0;
  transition: transform 0.2s;
}
.pdf-btn:hover {
  transform: scale(1.02);
}

.newsletter-block {
  background: linear-gradient(135deg, #4A1F8C 0%, #2A1545 100%);
  border-radius: 20px;
  padding: 24px 20px;
  margin: 28px 0 16px;
  text-align: center;
}
.newsletter-block h3 {
  font-family: 'DM Serif Display', serif;
  font-size: 20px;
  color: white;
  margin-bottom: 8px;
}
.newsletter-block p {
  font-size: 12px;
  color: #DDD6FE;
  margin-bottom: 16px;
}
.newsletter-input-group {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: center;
}
.newsletter-input-group input {
  flex: 1;
  min-width: 180px;
  padding: 12px 14px;
  border: none;
  border-radius: 40px;
  font-size: 13px;
}
.newsletter-input-group button {
  background: #C4714A;
  color: white;
  border: none;
  border-radius: 40px;
  padding: 12px 24px;
  font-weight: 500;
  cursor: pointer;
}
.improvement-badge {
  background: linear-gradient(135deg, #8B5CF6 0%, #4A1F8C 100%);
  color: white;
  padding: 2px 8px;
  border-radius: 20px;
  font-size: 10px;
  font-weight: 500;
  margin-left: 8px;
  display: inline-block;
  vertical-align: middle;
}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script>
// ============================================
// ESPERAR A QUE EL DOM ESTÉ COMPLETAMENTE CARGADO
// ============================================
document.addEventListener('DOMContentLoaded', function() {
  
  // Mapeo de síntomas a etapas
  const symptomToStage = {
    irregularidad: 'peri', nochesudor: 'peri', ansiedad: 'early',
    sueno: 'mixed', sofoco: 'mixed', menorrea: 'early',
    cerebro: 'mixed', libido: 'mixed', peso: 'late',
    sequedad: 'late', mamas: 'early', palpitaciones: 'peri',
    articular: 'mixed', uti: 'late', piel: 'late'
  };

  // Detectar etapa
  function detectStage() {
    const selectedIds = [];
    document.querySelectorAll('.sym-btn.on').forEach(btn => {
      const text = btn.innerText.trim();
      const symptom = symptoms.find(s => s.label === text);
      if (symptom) selectedIds.push(symptom.id);
    });
    
    if (selectedIds.length === 0) return null;
    
    const counts = { early: 0, peri: 0, mixed: 0, late: 0 };
    selectedIds.forEach(id => {
      const stage = symptomToStage[id];
      if (stage) counts[stage]++;
    });
    
    const earlyScore = counts.early + counts.peri;
    const lateScore = counts.late + counts.mixed;
    
    if (earlyScore > lateScore) {
      return { name: 'Inicio de transición', description: 'Tus síntomas son típicos del comienzo, cuando la progesterona empieza a bajar.', color: '#C4714A' };
    } else if (lateScore > earlyScore) {
      return { name: 'Transición avanzada', description: 'Tus síntomas son más de una etapa donde el estrógeno ya bajó o fluctúa más.', color: '#4A7C59' };
    } else {
      return { name: 'Transición activa', description: 'Tus síntomas abarcan diferentes momentos del proceso hormonal.', color: '#8B5CF6' };
    }
  }

  // Actualizar resumen dinámico
  function updateDynamicSummary() {
    const selectedBtns = document.querySelectorAll('.sym-btn.on');
    const stage = detectStage();
    
    let summaryDiv = document.getElementById('dynamic-summary');
    
    if (selectedBtns.length > 0 && stage) {
      if (!summaryDiv) {
        summaryDiv = document.createElement('div');
        summaryDiv.id = 'dynamic-summary';
        summaryDiv.className = 'dynamic-summary';
        const quizBtn = document.getElementById('quiz-btn');
        if (quizBtn && quizBtn.parentNode) {
          quizBtn.parentNode.insertBefore(summaryDiv, quizBtn);
        }
      }
      
      const symptomsList = Array.from(selectedBtns).map(btn => btn.innerText.trim()).join(', ');
      summaryDiv.innerHTML = `
        <h4>📋 Resumen de tu selección</h4>
        <p><strong>Has marcado ${selectedBtns.length} síntoma(s):</strong> ${symptomsList}</p>
        <p>${stage.description}</p>
        <span class="dynamic-stage-tag" style="background: ${stage.color}">🎯 Etapa sugerida: ${stage.name}</span>
      `;
      summaryDiv.style.display = 'block';
    } else if (summaryDiv) {
      summaryDiv.style.display = 'none';
    }
  }

  // Interceptar clicks en botones de síntomas
  function enhanceSymptomButtons() {
    const btns = document.querySelectorAll('.sym-btn');
    btns.forEach(btn => {
      if (!btn.hasAttribute('data-enhanced')) {
        btn.setAttribute('data-enhanced', 'true');
        const originalClick = btn.onclick;
        btn.onclick = function(e) {
          if (originalClick) originalClick.call(btn, e);
          setTimeout(updateDynamicSummary, 10);
          // Habilitar/deshabilitar botón de resultado
          const anySelected = document.querySelectorAll('.sym-btn.on').length > 0;
          const quizBtn = document.getElementById('quiz-btn');
          if (quizBtn) quizBtn.disabled = !anySelected;
        };
      }
    });
  }

  // Generar PDF
  async function generatePDF() {
    const selectedBtns = document.querySelectorAll('.sym-btn.on');
    if (selectedBtns.length === 0) {
      alert('Por favor, seleccioná al menos un síntoma.');
      return;
    }
    
    const stage = detectStage();
    const symptomsList = Array.from(selectedBtns).map(btn => btn.innerText.trim());
    
    // Obtener preguntas del médico
    const questionDivs = document.querySelectorAll('.doc-q');
    const questions = Array.from(questionDivs).slice(0, 8).map(q => q.innerText.trim());
    
    const pdfContent = `
      <!DOCTYPE html>
      <html>
      <head>
        <meta charset="UTF-8">
        <title>Mi resumen - Perimenopausia</title>
        <style>
          body { font-family: Arial, sans-serif; padding: 30px; max-width: 800px; margin: 0 auto; }
          h1 { color: #4A1F8C; font-size: 24px; border-bottom: 2px solid #8B5CF6; padding-bottom: 10px; }
          h2 { color: #5A3D7A; font-size: 18px; margin-top: 20px; }
          .stage-box { background: ${stage?.color || '#8B5CF6'}15; padding: 15px; border-radius: 12px; margin: 15px 0; border-left: 4px solid ${stage?.color || '#8B5CF6'}; }
          .symptom-list { background: #F5F0FF; padding: 12px; border-radius: 10px; margin: 10px 0; }
          .question-list { margin: 10px 0; padding-left: 20px; }
          .question-list li { margin: 8px 0; line-height: 1.5; }
          .footer { margin-top: 30px; font-size: 11px; color: #9B7FCC; text-align: center; border-top: 1px solid #DDD6FE; padding-top: 15px; }
        </style>
      </head>
      <body>
        <h1>📋 Mi resumen personalizado</h1>
        <p><strong>Fecha:</strong> ${new Date().toLocaleDateString()}</p>
        
        <div class="stage-box">
          <h2>🎯 Tu perfil</h2>
          <p><strong>Etapa sugerida:</strong> ${stage?.name || 'No determinado'}</p>
          <p>${stage?.description || 'Completa el quiz para ver tu perfil personalizado.'}</p>
        </div>
        
        <h2>📝 Síntomas seleccionados (${symptomsList.length})</h2>
        <div class="symptom-list">
          ${symptomsList.map(s => `• ${s}`).join('<br>')}
        </div>
        
        <h2>🏥 Preguntas para llevar a tu médica</h2>
        <div class="question-list">
          <ol>
            ${questions.map(q => `<li>${q}</li>`).join('')}
          </ol>
        </div>
        
        <div class="footer">
          <p>Scarlet Explica — Salud hormonal femenina</p>
          <p>Este documento es educativo y no reemplaza la consulta médica.</p>
        </div>
      </body>
      </html>
    `;
    
    const tempDiv = document.createElement('div');
    tempDiv.innerHTML = pdfContent;
    tempDiv.style.position = 'absolute';
    tempDiv.style.left = '-9999px';
    tempDiv.style.top = '-9999px';
    document.body.appendChild(tempDiv);
    
    try {
      const canvas = await html2canvas(tempDiv.firstChild, { scale: 2 });
      const imgData = canvas.toDataURL('image/png');
      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF('p', 'mm', 'a4');
      const imgWidth = 210;
      const imgHeight = (canvas.height * imgWidth) / canvas.width;
      pdf.addImage(imgData, 'PNG', 0, 0, imgWidth, imgHeight);
      pdf.save(`resumen-perimenopausia-${new Date().toISOString().slice(0,10)}.pdf`);
      alert('✅ PDF generado correctamente');
    } catch (err) {
      console.error('Error:', err);
      alert('Error al generar el PDF. Intentá de nuevo.');
    }
    
    document.body.removeChild(tempDiv);
  }

  // Agregar botón de PDF
  function addPDFButton() {
    const quizSection = document.getElementById('section-quiz');
    if (quizSection && !document.getElementById('pdf-btn-custom')) {
      const pdfBtn = document.createElement('button');
      pdfBtn.id = 'pdf-btn-custom';
      pdfBtn.className = 'pdf-btn';
      pdfBtn.innerHTML = '📄 Generar mi resumen en PDF';
      pdfBtn.onclick = generatePDF;
      
      const resultDiv = document.getElementById('quiz-result');
      if (resultDiv) {
        resultDiv.parentNode.insertBefore(pdfBtn, resultDiv.nextSibling);
      } else {
        quizSection.appendChild(pdfBtn);
      }
    }
  }

  // Agregar bloque de newsletter
  function addNewsletterBlock() {
    const medicoSection = document.getElementById('section-medico');
    if (medicoSection && !document.getElementById('newsletter-block-custom')) {
      const block = document.createElement('div');
      block.id = 'newsletter-block-custom';
      block.className = 'newsletter-block';
      block.innerHTML = `
        <h3>📚 Seguí aprendiendo con Scarlet</h3>
        <p>Recibí más guías, tips y recursos sobre salud hormonal femenina.</p>
        <div class="newsletter-input-group">
          <input type="email" id="newsletter-email" placeholder="tu@email.com">
          <button id="newsletter-subscribe">Suscribirme →</button>
        </div>
        <p style="font-size: 10px; margin-top: 12px; opacity: 0.7;">Recibirás contenido educativo. Sin spam.</p>
      `;
      medicoSection.appendChild(block);
      
      document.getElementById('newsletter-subscribe').onclick = () => {
        const email = document.getElementById('newsletter-email').value;
        if (email && email.includes('@')) {
          alert(`📧 ¡Gracias! Enviaremos contenido a ${email}`);
          document.getElementById('newsletter-email').value = '';
          // Aquí puedes agregar tu Google Forms o EmailJS después
        } else {
          alert('Por favor, ingresá un email válido.');
        }
      };
    }
  }

  // Agregar badge al título
  function addBadge() {
    const title = document.querySelector('.section-title');
    if (title && !document.querySelector('.improvement-badge')) {
      const badge = document.createElement('span');
      badge.className = 'improvement-badge';
      badge.innerHTML = '✨ Nueva guía PDF';
      title.appendChild(badge);
    }
  }

  // Observar cambios en el DOM (para cuando se muestre el resultado del quiz)
  const observer = new MutationObserver(function() {
    enhanceSymptomButtons();
    addPDFButton();
    addNewsletterBlock();
    addBadge();
    updateDynamicSummary();
  });
  
  observer.observe(document.body, { childList: true, subtree: true });
  
  // Inicializar
  enhanceSymptomButtons();
  addPDFButton();
  addNewsletterBlock();
  addBadge();
  updateDynamicSummary();
  
  // También actualizar cuando se haga clic en "Volver a hacer el quiz"
  const originalResetQuiz = window.resetQuiz;
  if (originalResetQuiz) {
    window.resetQuiz = function() {
      originalResetQuiz();
      setTimeout(() => {
        updateDynamicSummary();
        const quizBtn = document.getElementById('quiz-btn');
        if (quizBtn) quizBtn.disabled = true;
      }, 50);
    };
  }
  
});
</script>
