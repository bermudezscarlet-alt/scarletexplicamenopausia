<script>
// ============================================
// 1. PROCESAMIENTO DINÁMICO DE SÍNTOMAS
// ============================================

// Mapeo de síntomas a etapas (basado en tu lógica original)
const symptomToStage = {
  irregularidad: 'peri',
  nochesudor: 'peri',
  ansiedad: 'early',
  sueno: 'mixed',
  sofoco: 'mixed',
  menorrea: 'early',
  cerebro: 'mixed',
  libido: 'mixed',
  peso: 'late',
  sequedad: 'late',
  mamas: 'early',
  palpitaciones: 'peri',
  articular: 'mixed',
  uti: 'late',
  piel: 'late'
};

// Función para detectar etapa basada en síntomas seleccionados
function detectStageFromSymptoms(selectedSymptoms) {
  const counts = { early: 0, peri: 0, mixed: 0, late: 0 };
  selectedSymptoms.forEach(id => {
    const stage = symptomToStage[id];
    if (stage) counts[stage]++;
  });
  
  const total = selectedSymptoms.size;
  if (total === 0) return null;
  
  const earlyScore = counts.early + counts.peri;
  const lateScore = counts.late + counts.mixed;
  const diff = Math.abs(earlyScore - lateScore);
  const isMixed = diff <= 2 && earlyScore > 0 && lateScore > 0;
  
  if (isMixed) return { name: 'Transición activa', description: 'Estás en el punto medio de la transición, con síntomas de diferentes momentos del proceso hormonal.', color: '#8B5CF6' };
  if (earlyScore > lateScore) return { name: 'Inicio de transición', description: 'Tus síntomas son más típicos del comienzo del proceso, cuando la progesterona empieza a bajar.', color: '#C4714A' };
  return { name: 'Transición avanzada', description: 'Tus síntomas se parecen más a una etapa en la que el estrógeno ya bajó o fluctúa más.', color: '#4A7C59' };
}

// Función para actualizar el resumen dinámico
function updateDynamicSummary() {
  const selectedArray = Array.from(selected);
  const stage = detectStageFromSymptoms(selected);
  
  let summaryDiv = document.getElementById('dynamic-summary');
  if (!summaryDiv && selectedArray.length > 0) {
    // Crear el div de resumen si no existe
    const quizSection = document.getElementById('section-quiz');
    const resultDiv = document.getElementById('quiz-result');
    summaryDiv = document.createElement('div');
    summaryDiv.id = 'dynamic-summary';
    summaryDiv.className = 'dynamic-summary';
    if (resultDiv && resultDiv.style.display !== 'block') {
      resultDiv.parentNode.insertBefore(summaryDiv, resultDiv);
    } else if (quizSection) {
      quizSection.appendChild(summaryDiv);
    }
  }
  
  if (summaryDiv && selectedArray.length > 0 && stage) {
    summaryDiv.innerHTML = `
      <h4>📋 Resumen de tu selección</h4>
      <p><strong>Has marcado ${selectedArray.length} síntoma(s):</strong> ${selectedArray.map(id => symptoms.find(s => s.id === id)?.label || id).join(', ')}</p>
      <p>${stage.description}</p>
      <span class="dynamic-stage-tag" style="background: ${stage.color}">🎯 Etapa sugerida: ${stage.name}</span>
    `;
    summaryDiv.style.display = 'block';
  } else if (summaryDiv) {
    summaryDiv.style.display = 'none';
  }
}

// Interceptar la función original de selección de síntomas
const originalOnClick = (btn, s) => {
  return () => {
    if(selected.has(s.id)){
      selected.delete(s.id);
      btn.classList.remove('on');
    } else {
      selected.add(s.id);
      btn.classList.add('on');
    }
    document.getElementById('quiz-btn').disabled = selected.size === 0;
    updateDynamicSummary(); // Actualizar resumen dinámico
  };
};

// Reemplazar los eventos de los botones después de que se construyan
function enhanceQuizButtons() {
  const btns = document.querySelectorAll('.sym-btn');
  symptoms.forEach((s, idx) => {
    if (btns[idx]) {
      const newClick = originalOnClick(btns[idx], s);
      btns[idx].onclick = newClick;
    }
  });
}

// Esperar a que el DOM esté listo y mejorar los botones
setTimeout(() => {
  enhanceQuizButtons();
  updateDynamicSummary();
}, 100);

// ============================================
// 2. GENERACIÓN DE PDF PERSONALIZADO
// ============================================

function getFilteredQuestionsByStage() {
  const selectedArray = Array.from(selected);
  const stage = detectStageFromSymptoms(selected);
  const stageName = stage?.name || '';
  
  // Todas las preguntas del médico
  const allQuestions = [
    { text: '¿Mis síntomas podrían estar relacionados con cambios hormonales de la perimenopausia?', category: 'entender' },
    { text: '¿Tiene sentido medir FSH, estradiol o progesterona en mi caso, o el diagnóstico es principalmente clínico?', category: 'entender' },
    { text: '¿Podría hacerme un perfil de insulina en ayunas además de glucosa?', category: 'entender' },
    { text: '¿Convendría descartar que haya algo tiroideo detrás de algunos de mis síntomas?', category: 'entender' },
    { text: '¿Sería candidata para progesterona bioidéntica? ¿Cuáles son los pro y contra en mi caso?', category: 'hormonal' },
    { text: '¿Qué diferencia hay entre la progesterona bioidéntica y las progestinas sintéticas?', category: 'hormonal' },
    { text: '¿Qué opciones hay de estrógeno local para la sequedad vaginal o síntomas urinarios?', category: 'hormonal' },
    { text: '¿Es posible considerar terapia hormonal menopáusica (MHT) para mejorar mi calidad de vida?', category: 'hormonal' },
    { text: 'Tengo infecciones urinarias frecuentes desde que empezaron estos cambios — ¿podría ser parte del cuadro hormonal?', category: 'sintomas' },
    { text: 'Mi sangrado se volvió más abundante — ¿qué estudios harías para evaluarlo?', category: 'sintomas' },
    { text: 'Mis sofocos interrumpen el sueño todas las noches — ¿qué opciones tengo para manejarlos?', category: 'sintomas' },
    { text: '¿A partir de qué momento conviene hacer una densitometría ósea?', category: 'sintomas' },
    { text: '¿Hay algún recurso, especialista o referencia que me recomendés sobre este tema?', category: 'herramientas' },
    { text: '¿Cuándo tendría sentido volver a consultar o hacer seguimiento?', category: 'herramientas' },
    { text: '¿Hay cambios en mi dieta o estilo de vida que tendrían mayor impacto en esta etapa?', category: 'herramientas' }
  ];
  
  // Filtrar preguntas según la etapa
  let filtered = [...allQuestions];
  if (stageName === 'Inicio de transición') {
    filtered = allQuestions.filter(q => q.category !== 'sintomas' || q.text.includes('sangrado') || q.text.includes('insulina'));
  } else if (stageName === 'Transición avanzada') {
    filtered = allQuestions.filter(q => q.category !== 'entender' || q.text.includes('densitometría'));
  }
  
  return filtered.slice(0, 8); // Máximo 8 preguntas para el PDF
}

async function generatePDF() {
  const selectedArray = Array.from(selected);
  const stage = detectStageFromSymptoms(selected);
  const symptomsList = selectedArray.map(id => symptoms.find(s => s.id === id)?.label || id);
  const questions = getFilteredQuestionsByStage();
  
  // Crear contenido HTML para el PDF
  const pdfContent = `
    <!DOCTYPE html>
    <html>
    <head>
      <meta charset="UTF-8">
      <title>Mi resumen - Perimenopausia</title>
      <style>
        body { font-family: Arial, sans-serif; padding: 30px; max-width: 800px; margin: 0 auto; }
        h1 { color: #4A1F8C; font-size: 24px; border-bottom: 2px solid #8B5CF6; padding-bottom: 10px; }
        h2 { color: #5A3D7A; font-size: 18px; margin-top: 20px; }
        .stage-box { background: ${stage?.color || '#8B5CF6'}15; padding: 15px; border-radius: 12px; margin: 15px 0; border-left: 4px solid ${stage?.color || '#8B5CF6'}; }
        .symptom-list { background: #F5F0FF; padding: 12px; border-radius: 10px; margin: 10px 0; }
        .question-list { margin: 10px 0; padding-left: 20px; }
        .question-list li { margin: 8px 0; line-height: 1.5; }
        .footer { margin-top: 30px; font-size: 11px; color: #9B7FCC; text-align: center; border-top: 1px solid #DDD6FE; padding-top: 15px; }
      </style>
    </head>
    <body>
      <h1>📋 Mi resumen personalizado</h1>
      <p><strong>Fecha:</strong> ${new Date().toLocaleDateString()}</p>
      
      <div class="stage-box">
        <h2>🎯 Tu perfil</h2>
        <p><strong>Etapa sugerida:</strong> ${stage?.name || 'No determinado'}</p>
        <p>${stage?.description || 'Completa el quiz para ver tu perfil personalizado.'}</p>
      </div>
      
      <h2>📝 Síntomas seleccionados (${symptomsList.length})</h2>
      <div class="symptom-list">
        ${symptomsList.map(s => `• ${s}`).join('<br>')}
      </div>
      
      <h2>🏥 Preguntas para llevar a tu médica</h2>
      <div class="question-list">
        <ol>
          ${questions.map(q => `<li>${q.text}</li>`).join('')}
        </ol>
      </div>
      
      <div class="footer">
        <p>Scarlet Explica — Salud hormonal femenina</p>
        <p>Este documento es educativo y no reemplaza la consulta médica.</p>
      </div>
    </body>
    </html>
  `;
  
  // Usar html2canvas + jspdf para generar el PDF
  const tempDiv = document.createElement('div');
  tempDiv.innerHTML = pdfContent;
  tempDiv.style.position = 'absolute';
  tempDiv.style.left = '-9999px';
  tempDiv.style.top = '-9999px';
  document.body.appendChild(tempDiv);
  
  try {
    const canvas = await html2canvas(tempDiv.firstChild, { scale: 2 });
    const imgData = canvas.toDataURL('image/png');
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF('p', 'mm', 'a4');
    const imgWidth = 210;
    const imgHeight = (canvas.height * imgWidth) / canvas.width;
    pdf.addImage(imgData, 'PNG', 0, 0, imgWidth, imgHeight);
    pdf.save(`resumen-perimenopausia-${new Date().toISOString().slice(0,10)}.pdf`);
  } catch (err) {
    console.error('Error generando PDF:', err);
    alert('Hubo un error generando el PDF. Por favor, intentá de nuevo.');
  }
  
  document.body.removeChild(tempDiv);
}

function showEmailModal() {
  if (selected.size === 0) {
    alert('Por favor, seleccioná al menos un síntoma antes de generar tu resumen.');
    return;
  }
  
  const modal = document.createElement('div');
  modal.className = 'email-modal-overlay';
  modal.innerHTML = `
    <div class="email-modal">
      <h3>📧 Tu resumen personalizado</h3>
      <p>Ingresá tu email para recibir el PDF con tus síntomas y las preguntas para tu médica.</p>
      <input type="email" id="pdf-email-input" placeholder="tu@email.com" autocomplete="email">
      <button id="send-pdf-btn">📥 Enviar PDF por email</button>
      <button class="cancel-btn" id="download-only-btn">💾 Solo descargar PDF</button>
      <button class="close-modal" id="close-modal-btn">Cerrar</button>
    </div>
  `;
  document.body.appendChild(modal);
  
  // Configurar EmailJS (necesitarás registrarte gratis en https://www.emailjs.com/)
  // Por ahora, solo descarga local si no está configurado
  document.getElementById('send-pdf-btn').onclick = async () => {
    const email = document.getElementById('pdf-email-input').value;
    if (!email || !email.includes('@')) {
      alert('Por favor, ingresá un email válido.');
      return;
    }
    
    // Si quieres usar EmailJS, descomenta y configura:
    /*
    emailjs.init('TU_USER_ID');
    try {
      await emailjs.send('TU_SERVICE_ID', 'TU_TEMPLATE_ID', {
        to_email: email,
        pdf_link: 'El PDF se genera localmente, por ahora solo descarga'
      });
      alert('¡PDF enviado a ' + email + '! Revisá tu bandeja de entrada.');
      modal.remove();
    } catch(err) {
      alert('Error al enviar. Por ahora podés descargar el PDF manualmente.');
    }
    */
    
    // Mientras tanto, descarga local y avisa
    alert('📧 Función de envío por email en configuración. Por ahora, descargá el PDF manualmente.');
    await generatePDF();
    modal.remove();
  };
  
  document.getElementById('download-only-btn').onclick = async () => {
    await generatePDF();
    modal.remove();
  };
  
  document.getElementById('close-modal-btn').onclick = () => modal.remove();
}
